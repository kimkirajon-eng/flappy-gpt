<!DOCTYPE html>
<html>
<head>
  <title>Flappy Duo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="menu">
  <h1>Flappy Duo</h1>

  <div class="characters">
    <div class="card" onclick="selectChar('ceylan')" id="ceylanCard">
      🦌
      <p>Ceylan</p>
    </div>

    <div class="card" onclick="selectChar('hakki')" id="hakkiCard">
      😎
      <p>Hakkı</p>
    </div>
  </div>

  <button onclick="ready()" class="startBtn">Hazırım</button>

  <p id="status">Karakter seç</p>
</div>

<div id="game" class="hidden">
  <canvas id="canvasTop"></canvas>
  <canvas id="canvasBottom"></canvas>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
